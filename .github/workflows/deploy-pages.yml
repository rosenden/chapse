name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate GitLab token
        run: |
          if [ -z "${{ secrets.GALACTIK_TOKEN }}" ]; then
            echo "Missing required secret: GALACTIK_TOKEN"
            echo "Add it in: Settings > Secrets and variables > Actions."
            echo "Required scopes: read_repository (+ read_api if npm registry access is needed)."
            exit 1
          fi

      - name: Configure GitLab auth for private dependencies
        run: |
          git config --global url."https://oauth2:${{ secrets.GALACTIK_TOKEN }}@gitlab.chapsvision.in/".insteadOf "https://gitlab.chapsvision.in/"

      - name: Install dependencies
        env:
          GALACTIK_TOKEN: ${{ secrets.GALACTIK_TOKEN }}
        run: npm ci

      - name: Build
        env:
          GALACTIK_TOKEN: ${{ secrets.GALACTIK_TOKEN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
